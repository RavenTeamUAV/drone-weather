<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drone Weather — Вхід</title>
  <style>
    :root {
      --surface: rgba(255, 255, 255, 0.78);
      --surface-strong: rgba(255, 255, 255, 0.9);
      --hairline: rgba(106, 126, 156, 0.26);
      --text-primary: #101a2b;
      --text-secondary: #4a5d78;
      --accent: #0a84ff;
      --accent-pressed: #0068d8;
      --danger: #d64545;
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 22px;
      --shadow-lg: 0 16px 40px rgba(18, 29, 45, 0.18);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background:
        radial-gradient(circle at 10% 8%, rgba(174, 198, 232, 0.58), transparent 38%),
        radial-gradient(circle at 85% 18%, rgba(176, 196, 240, 0.58), transparent 34%),
        linear-gradient(150deg, #e9edf3, #dce3ee);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-lg);
      padding: 32px 30px;
      width: 100%;
      max-width: 440px;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .logo {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 24px;
      letter-spacing: 0.4px;
    }
    .tabs {
      display: flex;
      margin-bottom: 22px;
      background: rgba(118, 138, 168, 0.14);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }
    .tab {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      padding: 9px 0;
      border-radius: 999px;
      cursor: pointer;
      transition: background 150ms ease-out, color 150ms ease-out;
    }
    .tab.active {
      color: var(--text-primary);
      background: var(--surface-strong);
      box-shadow: 0 1px 2px rgba(18, 29, 45, 0.12);
    }
    .form { display: none; flex-direction: column; gap: 14px; }
    .form.active { display: flex; }
    label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
      display: block;
    }
    input {
      width: 100%;
      background: rgba(255,255,255,0.78);
      border: 1px solid var(--hairline);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 150ms ease-out, box-shadow 150ms ease-out;
    }
    input:focus {
      border-color: rgba(10,132,255,0.52);
      box-shadow: 0 0 0 3px rgba(10,132,255,0.14);
    }
    .btn {
      background: linear-gradient(180deg, #2891ff, #0a84ff);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      padding: 12px;
      cursor: pointer;
      transition: background 150ms ease-out, transform 150ms ease-out;
      margin-top: 4px;
    }
    .btn:hover { background: linear-gradient(180deg, #1e87f5, #0077ef); transform: translateY(-1px); }
    .btn:disabled { background: #a7bfd9; color: #f5f8fc; cursor: not-allowed; }
    .error {
      background: rgba(214,69,69,0.14);
      border: 1px solid rgba(214,69,69,0.35);
      color: var(--danger);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 13px;
      display: none;
    }
    .hint {
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">✈ Drone Weather</div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Вхід</button>
    <button class="tab" onclick="showTab('register')">Реєстрація</button>
  </div>

  <!-- LOGIN -->
  <form class="form active" id="form-login" onsubmit="doLogin(event)">
    <div>
      <label>Логін</label>
      <input id="l-username" type="text" autocomplete="username" required placeholder="ваш_логін">
    </div>
    <div>
      <label>Пароль</label>
      <input id="l-password" type="password" autocomplete="current-password" required placeholder="••••••••">
    </div>
    <div class="error" id="login-error"></div>
    <button class="btn" type="submit" id="login-btn">Увійти</button>
  </form>

  <!-- REGISTER -->
  <form class="form" id="form-register" onsubmit="doRegister(event)">
    <div>
      <label>Invite-код</label>
      <input id="r-invite" type="text" required placeholder="отримайте у адміністратора">
    </div>
    <div>
      <label>Логін</label>
      <input id="r-username" type="text" autocomplete="username" required placeholder="від 3 символів, a–z 0–9 _">
    </div>
    <div>
      <label>Пароль</label>
      <input id="r-password" type="password" autocomplete="new-password" required placeholder="мінімум 8 символів">
    </div>
    <div>
      <label>Підтвердіть пароль</label>
      <input id="r-password2" type="password" autocomplete="new-password" required placeholder="повторіть пароль">
    </div>
    <div class="error" id="register-error"></div>
    <button class="btn" type="submit" id="register-btn">Зареєструватись</button>
    <p class="hint">Invite-код надається адміністратором</p>
  </form>
</div>

<script>
  // If already logged in — redirect to app
  fetch('/api/auth/me').then(r => { if (r.ok) location.replace('/'); });

  function showTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) =>
      t.classList.toggle('active', (i === 0) === (tab === 'login')));
    document.getElementById('form-login').classList.toggle('active', tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError(id) {
    document.getElementById(id).style.display = 'none';
  }

  async function doLogin(e) {
    e.preventDefault();
    hideError('login-error');
    const btn = document.getElementById('login-btn');
    btn.disabled = true;
    btn.textContent = 'Вхід…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('l-username').value.trim(),
          password: document.getElementById('l-password').value
        })
      });
      const data = await res.json();
      if (!res.ok) { showError('login-error', data.error || 'Помилка входу'); return; }
      location.replace('/');
    } catch {
      showError('login-error', 'Помилка з\'єднання з сервером');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Увійти';
    }
  }

  async function doRegister(e) {
    e.preventDefault();
    hideError('register-error');
    const pw  = document.getElementById('r-password').value;
    const pw2 = document.getElementById('r-password2').value;
    if (pw !== pw2) { showError('register-error', 'Паролі не співпадають'); return; }
    const btn = document.getElementById('register-btn');
    btn.disabled = true;
    btn.textContent = 'Реєстрація…';
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('r-username').value.trim(),
          password: pw,
          inviteCode: document.getElementById('r-invite').value.trim()
        })
      });
      const data = await res.json();
      if (!res.ok) { showError('register-error', data.error || 'Помилка реєстрації'); return; }
      location.replace('/');
    } catch {
      showError('register-error', 'Помилка з\'єднання з сервером');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Зареєструватись';
    }
  }
</script>
</body>
</html>
